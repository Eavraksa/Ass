<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Website</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">

    <style>
        #menu-toggle {
            display: none;
        }

        @media (max-width: 768px) {
            .menu-links {
                left: -250px;
                transition: left 0.2s ease;
            }

            #menu-toggle:checked ~ .navbar .menu-links {
                left: 0;
            }
        }
    </style>
</head>

<body>

    <header>
        <!-- Hidden checkbox for menu toggle -->
        <input type="checkbox" id="menu-toggle">

        <nav class="navbar">
            <a class="logo" href="#">Coffee<span>.</span></a>

            <!-- Hamburger Menu Button -->
            <label for="menu-toggle" id="hamburger-btn" class="material-symbols-outlined">
                menu
            </label>

            <ul class="menu-links">
                <!-- Close Menu Button -->
                <label for="menu-toggle" id="close-menu-btn" class="material-symbols-outlined">
                    close
                </label>

                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Products</a></li>
                <li><a href="ContactUs.html">About Us</a></li>
                <li><a href="ContactUs.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-section">
        <div class="content">
            <h2>Start Your Day With Fresh Coffee</h2>
            <p>
                Coffee is a popular and beloved beverage enjoyed by people around the world.
            </p>
            <button>Order Now</button>
        </div>
    </section>

</body>
</html>
